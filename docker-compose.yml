# =============================================================================
# STARWAVE – Docker Compose (environnement local complet)
# Usage : docker-compose up -d --build
# =============================================================================

name: starwave

networks:
  starwave-net:
    driver: bridge

volumes:
  mariadb-data:
  kafka-data:
  keycloak-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # -------------------------------------------------------------------------
  # MariaDB 11.x
  # -------------------------------------------------------------------------
  mariadb:
    image: mariadb:11.3
    container_name: starwave-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE:      ${MARIADB_DATABASE}
      MARIADB_USER:          ${MARIADB_USER}
      MARIADB_PASSWORD:      ${MARIADB_PASSWORD}
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./infra/docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u root -p$$MARIADB_ROOT_PASSWORD -e 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Kafka 3.9 – mode KRaft (sans Zookeeper)
  # -------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: starwave-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID:                        1
      KAFKA_PROCESS_ROLES:                  "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS:       "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES:      "CONTROLLER"
      KAFKA_LISTENERS:                      "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS:           "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME:     "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:      "true"
      KAFKA_NUM_PARTITIONS:                 3
      KAFKA_DEFAULT_REPLICATION_FACTOR:     1
      KAFKA_LOG_DIRS:                       "/var/lib/kafka/data"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Kafka UI
  # -------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: starwave-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:             starwave
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Keycloak 26.x
  # -------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: starwave-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB:                       mariadb
      KC_DB_URL:                   jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE}
      KC_DB_USERNAME:              ${MARIADB_USER}
      KC_DB_PASSWORD:              ${MARIADB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_HTTP_PORT:                8080
      KC_HOSTNAME_STRICT:          false
      KC_HTTP_ENABLED:             true
      KC_HEALTH_ENABLED:           true
      KC_METRICS_ENABLED:          true
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
      - "9000:9000"
    volumes:
      - ./infra/docker/keycloak/realm-starwave.json:/opt/keycloak/data/import/realm-starwave.json:ro
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Redis 7
  # -------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: starwave-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Prometheus
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: starwave-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/docker/prometheus/rules:/etc/prometheus/rules:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Grafana
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: starwave-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL:         http://localhost:${GRAFANA_PORT:-3000}
      GF_AUTH_ANONYMOUS_ENABLED:  false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Backend Spring Boot
  # context = racine du projet pour accéder au pom.xml parent
  # -------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: starwave/backend:dev
    container_name: starwave-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE:                   dev
      SPRING_DATASOURCE_URL:                    jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE}
      SPRING_DATASOURCE_USERNAME:               ${MARIADB_USER}
      SPRING_DATASOURCE_PASSWORD:               ${MARIADB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS:           kafka:9092
      SPRING_DATA_REDIS_HOST:                   redis
      SPRING_DATA_REDIS_PORT:                   6379
      SPRING_DATA_REDIS_PASSWORD:               ${REDIS_PASSWORD}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/starwave
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:  always
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_SERVER_PORT: "8099"
      MANAGEMENT_SERVER_ADDRESS: "0.0.0.0"
      # SPRING_APPLICATION_JSON = priorité maximale, lu avant tout contexte Spring
      SPRING_APPLICATION_JSON: '{"management.server.port":8099,"management.server.address":"0.0.0.0","management.endpoints.web.exposure.include":"*","management.endpoint.health.show-details":"always","management.endpoint.health.probes.enabled":true,"spring.jpa.open-in-view":false}'
      JAVA_OPTS: "--enable-native-access=ALL-UNNAMED -Xms256m -Xmx512m -XX:+UseContainerSupport -Dmanagement.server.port=8099 -Dmanagement.server.address=0.0.0.0 -Dmanagement.endpoints.web.exposure.include=* -Dmanagement.endpoint.health.show-details=always"
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/app/config/"
    volumes:
      - ./backend/src/main/resources/application-dev.properties:/app/config/application-dev.properties:ro
    ports:
      - "${BACKEND_PORT:-8081}:8081"
      - "8099:8099"
    depends_on:
      mariadb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:8099/actuator/health 2>/dev/null || wget -q --tries=1 --spider http://localhost:8081/api/actuator/health 2>/dev/null || pgrep -f app.jar > /dev/null || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Gateway Spring Cloud
  # -------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: starwave/gateway:dev
    container_name: starwave-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE:                   dev
      BACKEND_URL:                              http://backend:8081
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/starwave
      MANAGEMENT_SERVER_PORT: "8098"
      MANAGEMENT_SERVER_ADDRESS: "0.0.0.0"
      SPRING_APPLICATION_JSON: '{"management.server.port":8098,"management.server.address":"0.0.0.0","management.endpoints.web.exposure.include":"*","management.endpoint.health.show-details":"always","management.endpoint.gateway.enabled":true}'
      JAVA_OPTS: "--enable-native-access=ALL-UNNAMED -Xms128m -Xmx256m -XX:+UseContainerSupport -Dmanagement.server.port=8098 -Dmanagement.server.address=0.0.0.0 -Dmanagement.endpoints.web.exposure.include=* -Dmanagement.endpoint.health.show-details=always -Dmanagement.endpoint.gateway.enabled=true"
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/app/config/"
    volumes:
      - ./gateway/src/main/resources/application-dev.properties:/app/config/application-dev.properties:ro
    ports:
      - "${GATEWAY_PORT:-8082}:8082"
      - "8098:8098"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:8098/actuator/health 2>/dev/null && exit 0; wget -q --tries=1 --spider http://localhost:8082/actuator/health 2>/dev/null && exit 0; pgrep -f app.jar > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Worker crossmatch
  # -------------------------------------------------------------------------
  worker-crossmatch:
    build:
      context: crossmatch
      dockerfile: Dockerfile
    image: starwave/worker-crossmatch:dev
    container_name: starwave-worker-crossmatch
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL:               redis://:${REDIS_PASSWORD}@redis:6379/0
      WORKER_MODE:             cpu
      LOG_LEVEL:               ${LOG_LEVEL:-INFO}
    ports:
      - "${WORKER_CROSSMATCH_PORT:-8001}:8001"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Worker spectral
  # -------------------------------------------------------------------------
  worker-spectral:
    build:
      context: spectral
      dockerfile: Dockerfile
    image: starwave/worker-spectral:dev
    container_name: starwave-worker-spectral
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL:               redis://:${REDIS_PASSWORD}@redis:6379/1
      WORKER_MODE:             cpu
      LOG_LEVEL:               ${LOG_LEVEL:-INFO}
    ports:
      - "${WORKER_SPECTRAL_PORT:-8002}:8002"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Worker GPU (generic)
  # -------------------------------------------------------------------------
  worker-gpu:
    build:
      context: workers
      dockerfile: Dockerfile
    image: starwave/workers:dev
    container_name: starwave-workers
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL:               redis://:${REDIS_PASSWORD}@redis:6379/2
      WORKER_MODE:             cpu
      LOG_LEVEL:               ${LOG_LEVEL:-INFO}
    ports:
      - "${WORKER_GPU_PORT:-8003}:8003"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - starwave-net

  # -------------------------------------------------------------------------
  # Frontend Angular 21
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: starwave/frontend:dev
    container_name: starwave-frontend
    restart: unless-stopped
    environment:
      NG_APP_API_URL:         http://localhost:${GATEWAY_PORT:-8082}
      NG_APP_KEYCLOAK_URL:    http://localhost:${KEYCLOAK_PORT:-8080}
      NG_APP_KEYCLOAK_REALM:  starwave
      NG_APP_KEYCLOAK_CLIENT: starwave-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:4200 2>/dev/null || pgrep -f 'ng serve' > /dev/null || pgrep -f 'node' > /dev/null || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - starwave-net
