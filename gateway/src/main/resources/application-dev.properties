# =============================================================================
# STARWAVE Gateway – Configuration profil DEV
# src/main/resources/application-dev.properties
# =============================================================================
# NOTE : Les routes Spring Cloud Gateway sont difficiles à exprimer en
# .properties pur (listes d'objets imbriqués). Spring Boot accepte la notation
# indexée [n].clé pour les collections de maps.  Chaque route est un objet
# dans la liste spring.cloud.gateway.routes[].
# =============================================================================

# ---------------------------------------------------------------------------
# Serveur
# ---------------------------------------------------------------------------
server.port=8082
server.shutdown=graceful

# ---------------------------------------------------------------------------
# Application
# ---------------------------------------------------------------------------
spring.application.name=starwave-gateway

# ---------------------------------------------------------------------------
# Spring Cloud Gateway – Filtres globaux
# ---------------------------------------------------------------------------
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# ---------------------------------------------------------------------------
# CORS global
# ---------------------------------------------------------------------------
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[0]=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[5]=PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[0]=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# ---------------------------------------------------------------------------
# Routes
# ---------------------------------------------------------------------------

# Route 0 – Backend API
spring.cloud.gateway.routes[0].id=backend-api
spring.cloud.gateway.routes[0].uri=${BACKEND_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[0].filters[1]=TokenRelay=

# Route 1 – Backend Actuator (interne, non exposé publiquement en prod)
spring.cloud.gateway.routes[1].id=backend-actuator
spring.cloud.gateway.routes[1].uri=${BACKEND_URL:http://localhost:8081}
spring.cloud.gateway.routes[1].predicates[0]=Path=/actuator/backend/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/actuator/backend/(?<segment>.*), /actuator/${segment}

# Route 2 – Worker Crossmatch
spring.cloud.gateway.routes[2].id=worker-crossmatch
spring.cloud.gateway.routes[2].uri=http://worker-crossmatch:8001
spring.cloud.gateway.routes[2].predicates[0]=Path=/workers/crossmatch/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2
spring.cloud.gateway.routes[2].filters[1]=TokenRelay=

# Route 3 – Worker Spectral
spring.cloud.gateway.routes[3].id=worker-spectral
spring.cloud.gateway.routes[3].uri=http://worker-spectral:8002
spring.cloud.gateway.routes[3].predicates[0]=Path=/workers/spectral/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2
spring.cloud.gateway.routes[3].filters[1]=TokenRelay=

# Route 4 – Worker GPU
spring.cloud.gateway.routes[4].id=worker-gpu
spring.cloud.gateway.routes[4].uri=http://worker-gpu:8003
spring.cloud.gateway.routes[4].predicates[0]=Path=/workers/gpu/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=2
spring.cloud.gateway.routes[4].filters[1]=TokenRelay=

# ---------------------------------------------------------------------------
# Security – OAuth2 Resource Server (Keycloak)
# ---------------------------------------------------------------------------
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/realms/starwave}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

# ---------------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.env=dev

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.reactor.netty.http.client=DEBUG
