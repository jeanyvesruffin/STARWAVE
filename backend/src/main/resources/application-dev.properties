# =============================================================================
# STARWAVE Backend – Configuration profil DEV
# src/main/resources/application-dev.properties
# =============================================================================

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=8081
server.shutdown=graceful
server.servlet.context-path=/api

# ---------------------------------------------------------------------------
# Application
# ---------------------------------------------------------------------------
spring.application.name=starwave-backend
# Java 25 Virtual Threads activé
spring.threads.virtual.enabled=true
# Activation de couleur dans le banner
spring.output.ansi.enabled=always

# ---------------------------------------------------------------------------
# DataSource – MariaDB
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/starwave}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:starwave}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

