# spring.data.redis.lettuce.pool.max-active=8
# spring.data.redis.lettuce.pool.min-idle=1

# ---------------------------------------------------------------------------
# Spring Batch
# ---------------------------------------------------------------------------
spring.batch.job.enabled=false
# spring.batch.jdbc.initialize-schema=always

# ---------------------------------------------------------------------------
# Security / OAuth2 Resource Server (Keycloak)
# ---------------------------------------------------------------------------
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/realms/starwave}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

# ---------------------------------------------------------------------------
# Actuator / Monitoring
# IMPORTANT : endpoints publics en DEV pour healthcheck Docker + Prometheus
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
# management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.env=dev

# ---------------------------------------------------------------------------
# Actuator sur port dedie 8099 - propre serveur Tomcat sans SecurityFilterChain
# Le port 8099 est invisible a Spring Security -> pas de 401
# Docker healthcheck et Prometheus ciblent ce port
# ---------------------------------------------------------------------------
management.server.port=8099
management.server.address=0.0.0.0

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.ruffinjy.starwave=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n

