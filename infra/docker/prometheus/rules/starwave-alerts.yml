# =============================================================================
# STARWAVE – Règles d'alerte Prometheus
# =============================================================================

groups:

  # ---------------------------------------------------------------------------
  # Disponibilité des services
  # ---------------------------------------------------------------------------
  - name: starwave.availability
    interval: 30s
    rules:

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary:     "Service {{ $labels.job }} hors ligne"
          description: "L'instance {{ $labels.instance }} ne répond plus depuis 1 min."

      - alert: BackendHealthDegraded
        expr: |
          sum by (job) (
            spring_boot_actuator_health{status!="UP", job="starwave-backend"}
          ) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Backend STARWAVE dégradé"

  # ---------------------------------------------------------------------------
  # Kafka
  # ---------------------------------------------------------------------------
  - name: starwave.kafka
    rules:

      - alert: KafkaConsumerLagHigh
        expr: |
          kafka_consumer_group_lag{job=~"starwave.*"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "Lag consommateur Kafka élevé"
          description: "Le groupe {{ $labels.group }} accuse un lag de {{ $value }} messages."

  # ---------------------------------------------------------------------------
  # JVM Spring Boot
  # ---------------------------------------------------------------------------
  - name: starwave.jvm
    rules:

      - alert: JvmMemoryHighUsage
        expr: |
          (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "Utilisation heap JVM > 85%"
          description: "Instance {{ $labels.instance }} – heap à {{ printf \"%.0f\" $value }}%."

      - alert: JvmGcPauseHigh
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m]) / rate(jvm_gc_pause_seconds_count[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pauses GC JVM élevées (> 500 ms en moyenne)"

  # ---------------------------------------------------------------------------
  # HTTP / API
  # ---------------------------------------------------------------------------
  - name: starwave.http
    rules:

      - alert: HighErrorRate
        expr: |
          sum by (job) (
            rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          )
          /
          sum by (job) (
            rate(http_server_requests_seconds_count[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary:     "Taux d'erreur HTTP 5xx > 5%"
          description: "Service {{ $labels.job }} – {{ printf \"%.1f\" $value | multiply 100 }}% d'erreurs."

      - alert: SlowApiResponse
        expr: |
          histogram_quantile(0.95,
            sum by (le, job) (
              rate(http_server_requests_seconds_bucket[5m])
            )
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latence API > 2s sur {{ $labels.job }}"

  # ---------------------------------------------------------------------------
  # Workers Python
  # ---------------------------------------------------------------------------
  - name: starwave.workers
    rules:

      - alert: WorkerUnhealthy
        expr: up{job=~"worker-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary:     "Worker {{ $labels.job }} indisponible"
          description: "Le worker {{ $labels.instance }} ne répond plus."
