name: CI – Backend (Spring Boot)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "gateway/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "gateway/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  build-and-test:
    name: Maven Build & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 24
        uses: actions/setup-java@v5
        with:
          java-version: "24"
          distribution: temurin
          cache: maven

      - name: Build & run tests (tous les modules)
        run: mvn --batch-mode clean verify

      - name: Upload JAR – backend
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

      - name: Upload JAR – gateway
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: gateway-jar
          path: gateway/target/*.jar
          retention-days: 7

      - name: Upload test reports – backend
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload test reports – gateway
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: gateway-test-reports
          path: gateway/target/surefire-reports/
          retention-days: 7